services:
  bailiff:
    build: .
    image: bailiff:latest
    container_name: bailiff
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      BAILIFF_TRANSPORT: ${BAILIFF_TRANSPORT:-http}
      BAILIFF_HOST: ${BAILIFF_HOST:-0.0.0.0}
      BAILIFF_PORT: ${BAILIFF_PORT:-8100}
      BAILIFF_PATH: ${BAILIFF_PATH:-/mcp}
      UPSTREAM_URL: ${UPSTREAM_URL:-http://localhost:4000}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-}
      UPSTREAM_MODEL: ${UPSTREAM_MODEL:-local}
      KNOWLEDGE_URL: ${KNOWLEDGE_URL:-http://localhost:8000/mcp}
      KNOWLEDGE_LABEL: ${KNOWLEDGE_LABEL:-knowledge}
      KNOWLEDGE_ALLOWED_TOOLS: ${KNOWLEDGE_ALLOWED_TOOLS:-}
      KNOWLEDGE_TOOL: ${KNOWLEDGE_TOOL:-}
      BAILIFF_SYSTEM_PROMPT_FILE: ${BAILIFF_SYSTEM_PROMPT_FILE:-/app/system_prompt.md}
      BAILIFF_INSTRUCTIONS: ${BAILIFF_INSTRUCTIONS:-}
      BAILIFF_TIMEOUT: ${BAILIFF_TIMEOUT:-180}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    # Mount a custom prompt to override the baked-in default without rebuilding:
    # volumes:
    #   - ./system_prompt.md:/app/system_prompt.md:ro
